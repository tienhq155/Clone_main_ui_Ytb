<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youtube</title>
    <link rel="stylesheet" href="general.css">
    <link rel="stylesheet" href="header.css">
    <link rel="stylesheet" href="video.css">
</head>
<body>
    <div class="header">
        <div class="left-section">
            <img class="hamburger-menu" src="icon/hamburger-menu.svg">
            <img class="youtube-logo" src="icon/youtube-logo.svg">
        </div>
        <div class="mid-section">
            <input class="search-bar" type="text" placeholder="Search">
            <button class="search-button"><img class="search-icon" src="icon/search.svg"></button>
            <button class="voice-search-button"><img class="voice-search-icon" src="icon/voice-search-icon.svg"></button>     
        </div>
        <div class="right-section">
            <img class="upload-icon" src="icon/upload.svg">
            <img class="youtube-apps-icon" src="icon/youtube-apps.svg">
            <img class="notifications-icon" src="icon/notifications.svg">
            <img class="current-user-picture" src="channel-pictures/my-channel.png">
        </div>
    </div>
   
</body>
</html>
